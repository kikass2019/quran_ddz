name: quran_sunnah_app
description: تطبيق القرآن والسنة
publish_to: 'none'
version: 2.1.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP
  http: ^1.1.0

  # Audio — Quran lecteur
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  # Audio — Adhan (AssetSource bundlé, jamais UrlSource)
  audioplayers: ^6.1.0

  # Notifications Adhan
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # WebView (ترتيل/tanzil)
  webview_flutter: ^4.4.2

  # Localisation / capteurs Qibla
  geolocator: ^12.0.0
  flutter_compass: ^0.8.0

  # Utils
  url_launcher: ^6.2.3
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    # ── Audio Adhan bundlé ──────────────────────────────────────
    # Placer les MP3 dans assets/audio/ (noms exacts ci-dessous)
    - assets/audio/adhan_makkah.mp3
    - assets/audio/adhan_madinah.mp3
    - assets/audio/adhan_haram.mp3
    - assets/audio/adan1.mp3
    - assets/audio/adan2.mp3
    - assets/audio/adan3.mp3
    - assets/audio/adhan_short.mp3
    - assets/hadiths/

  # fonts:
  #   - family: Amiri
  #     fonts:
  #       - asset: assets/fonts/Amiri-Regular.ttf
  #       - asset: assets/fonts/Amiri-Bold.ttf
  #         weight: 700
